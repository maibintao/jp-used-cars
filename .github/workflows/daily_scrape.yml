name: Daily Car Data Update

"on":
  schedule:
    - cron: "0 1 * * *"   # UTC 01:00 = JST 10:00 every day
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run scraper pipeline
        run: python main.py

      - name: Validate output
        run: python scripts/health_check.py

      - name: Commit and push cars.json
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git config user.email "bot@jpusedcars.com"
          git config user.name "Daily Update Bot"

          # Sync to latest remote state (keeps generated cars.json on disk)
          git fetch origin main
          git reset --soft origin/main

          # Commit only cars.json on top of latest remote
          git add website/public/data/cars.json
          git diff --staged --quiet && echo "No changes, skipping push." || (
            git commit -m "data: daily update $(date -u +%Y-%m-%d)" &&
            git push
          )
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify on failure
        if: failure()
        run: echo "::error::Daily scrape failed. Check logs above."
