name: Daily Car Data Update

"on":
  schedule:
    - cron: "0 1 * * *"   # UTC 01:00 = JST 10:00 every day
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so rebase works cleanly

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run scraper pipeline
        run: python main.py

      - name: Validate output
        run: python scripts/health_check.py

      - name: Commit updated cars.json
        run: |
          git config user.email "bot@jpusedcars.com"
          git config user.name "Daily Update Bot"
          git add website/public/data/cars.json
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "data: daily update $(date -u +%Y-%m-%d)"

      - name: Push changes (with retry on conflict)
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in 10s..."
            sleep 10
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify on failure
        if: failure()
        run: echo "::error::Daily scrape failed. Check logs above."
